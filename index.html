<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BikePro - APK Ready</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00b894; --secondary: #0984e3; --dark: #2d3436; --light: #f1f2f6; --danger: #d63031; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; touch-action: manipulation; }
        body { background: var(--light); margin: 0; padding: 10px; text-align: center; }
        
        .header { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 10px; position: relative; }
        .btn { padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; border: none; cursor: pointer; margin-top: 5px; font-size: 1rem; }
        .btn-primary { background: var(--secondary); color: white; }
        .btn-dark { background: var(--dark); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        
        /* تحسين شكل خانة الدخول */
        #adminArea { margin-top: 10px; border-top: 1px solid #eee; padding-top: 10px; }
        .pass-input { width: 60%; padding: 8px; border-radius: 8px; border: 1px solid #ddd; text-align: center; font-size: 0.9rem; }

        .search-container { margin-bottom: 15px; }
        .search-input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; font-size: 1rem; text-align: center; outline: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 25px; width: 90%; max-width: 400px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { padding: 15px; background: white; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 15px; overflow-y: auto; flex-grow: 1; }

        .grid-select { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .grid-item { background: #f0f0f0; padding: 15px 2px; border-radius: 8px; font-weight: bold; border: 1px solid #ddd; }

        #activeRentals { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .bike-box { background: white; border-radius: 12px; padding: 12px 2px; border-bottom: 4px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .state-expired { border-bottom-color: var(--danger); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="header">
    <h2 id="title">بي برو - سحابي</h2>
    
    <div id="adminArea">
        <div id="loginSection">
            <input type="password" id="passCode" class="pass-input" placeholder="كلمة السر">
            <button onclick="checkAdmin()" style="padding: 8px 15px; border-radius: 8px; background: var(--dark); color: white; border: none;">دخول</button>
        </div>
        
        <div id="adminTools" style="display:none; flex-direction: column; gap: 5px;">
            <button class="btn btn-primary" onclick="openBikeList()">➕ إضافة من القائمة (1-200)</button>
            <button class="btn btn-dark" onclick="addManual()">⌨️ إضافة يدوية</button>
            <button onclick="location.reload()" style="font-size: 0.7rem; background: none; border: none; color: gray;">تسجيل خروج</button>
        </div>
    </div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن سيكل..." oninput="renderBikes()">
</div>

<div id="activeRentals"></div>

<div id="bikeModal" class="modal"><div class="modal-content"><div class="modal-header"><h3>اختر السيكل</h3><button onclick="closeModals()" class="btn-danger">X</button></div><div class="modal-body"><div class="grid-select" id="bikeGrid"></div></div></div></div>
<div id="timeModal" class="modal"><div class="modal-content" style="padding: 20px;"><h3>سيكل رقم: <span id="targetBikeId"></span></h3><div style="display:flex; gap:10px;"><button onclick="confirmAdd(30)" style="flex:1; padding:20px; background:var(--primary); color:white; border-radius:15px; border:none; font-weight:bold;">30د</button><button onclick="confirmAdd(60)" style="flex:1; padding:20px; background:var(--secondary); color:white; border-radius:15px; border:none; font-weight:bold;">60د</button></div><button class="btn btn-dark" onclick="closeModals()">إلغاء</button></div></div>
<div id="editModal" class="modal"><div class="modal-content" style="padding:20px;"><h3>تعديل <span id="displayEditId"></span></h3><input type="hidden" id="editKey"><input type="text" id="editId" placeholder="الرقم" style="width:100%; padding:10px; margin:5px 0;"><input type="number" id="editTime" placeholder="إضافة وقت" style="width:100%; padding:10px; margin:5px 0;"><button class="btn btn-primary" onclick="saveEdit()">حفظ</button><button class="btn btn-danger" onclick="deleteBike()">حذف</button><button class="btn btn-dark" onclick="closeModals()">إلغاء</button></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyARmaRrsN2WRdpeXtQScQnu9MYFS8vqVXU",
        authDomain: "bikepro-969da.firebaseapp.com",
        projectId: "bikepro-969da",
        storageBucket: "bikepro-969da.firebasestorage.app",
        messagingSenderId: "350586929595",
        appId: "1:350586929595:web:dc1823c9c18aa397ec849e",
        measurementId: "G-JVVN45N7GD",
        databaseURL: "https://bikepro-969da-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isAdmin = false;
    let selectedBikeId = null;
    let allBikes = {};

    function checkAdmin() {
        const pass = document.getElementById('passCode').value;
        if(pass === "1234") {
            isAdmin = true;
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminTools').style.display = 'flex';
            renderBikes();
        } else {
            alert("خطأ في كلمة السر");
        }
    }

    function openBikeList() {
        const grid = document.getElementById('bikeGrid');
        grid.innerHTML = '';
        for(let i=1; i<=200; i++) {
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.innerText = i;
            item.onclick = () => { selectedBikeId = i; showTimeOptions(); };
            grid.appendChild(item);
        }
        document.getElementById('bikeModal').style.display = 'flex';
    }

    function addManual() {
        let id = prompt("رقم أو اسم السيكل:");
        if(id) { selectedBikeId = id; showTimeOptions(); }
    }

    function showTimeOptions() {
        document.getElementById('targetBikeId').innerText = selectedBikeId;
        document.getElementById('bikeModal').style.display = 'none';
        document.getElementById('timeModal').style.display = 'flex';
    }

    function confirmAdd(mins) {
        db.ref('rentals').push({ id: selectedBikeId, end: Date.now() + (mins * 60000) });
        closeModals();
    }

    db.ref('rentals').on('value', (snapshot) => {
        allBikes = snapshot.val() || {};
        renderBikes();
    });

    function renderBikes() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const area = document.getElementById('activeRentals');
        area.innerHTML = '';
        Object.keys(allBikes).forEach(key => {
            const r = allBikes[key];
            if (r.id.toString().toLowerCase().includes(query)) {
                let diff = r.end - Date.now();
                const box = document.createElement('div');
                box.className = `bike-box ${diff <= 0 ? 'state-expired' : ''}`;
                box.innerHTML = `<div style="font-size:0.6rem">سيكل</div><div style="font-weight:900;">${r.id}</div><div>${Math.ceil(diff/60000)}m</div>`;
                box.onclick = () => {
                    if(isAdmin) {
                        document.getElementById('editKey').value = key;
                        document.getElementById('editId').value = r.id;
                        document.getElementById('displayEditId').innerText = r.id;
                        document.getElementById('editModal').style.display = 'flex';
                    }
                };
                area.appendChild(box);
            }
        });
    }

    function saveEdit() {
        const key = document.getElementById('editKey').value;
        const newId = document.getElementById('editId').value;
        const addMins = parseInt(document.getElementById('editTime').value) || 0;
        db.ref('rentals/'+key).once('value', s => {
            db.ref('rentals/'+key).update({ id: newId, end: s.val().end + (addMins * 60000) });
        });
        closeModals();
    }

    function deleteBike() {
        if(confirm("حذف؟")) {
            db.ref('rentals/'+document.getElementById('editKey').value).remove();
            closeModals();
        }
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    setInterval(renderBikes, 15000);
</script>
</body>
</html>
