<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BikePro - Ultra</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00b894; --secondary: #0984e3; --dark: #2d3436; --light: #f1f2f6; --danger: #d63031; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; touch-action: manipulation; }
        body { background: var(--light); margin: 0; padding: 10px; text-align: center; }
        
        .header { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 10px; position: relative; }
        .btn { padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; border: none; cursor: pointer; margin-top: 5px; }
        .btn-primary { background: var(--secondary); color: white; }
        .btn-dark { background: var(--dark); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        .lang-btn { position: absolute; top: 15px; left: 15px; width: auto; padding: 5px 10px; font-size: 0.7rem; background: var(--dark); color: white; border-radius: 8px; z-index: 10; }

        .search-container { margin-bottom: 15px; }
        .search-input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; font-size: 1rem; text-align: center; outline: none; }

        /* النوافذ */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 25px; width: 90%; max-width: 400px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* الهيدر الثابت داخل النافذة */
        .modal-header { padding: 15px; background: white; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 15px; overflow-y: auto; flex-grow: 1; }

        .grid-select { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .grid-item { background: #f0f0f0; padding: 15px 2px; border-radius: 8px; font-weight: bold; border: 1px solid #ddd; }

        .input-group { margin: 15px 0; text-align: right; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #ccc; margin-top: 5px; font-size: 1rem; }

        #activeRentals { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .bike-box { background: white; border-radius: 12px; padding: 12px 2px; border-bottom: 4px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .state-expired { border-bottom-color: var(--danger); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<button class="btn lang-btn" onclick="toggleLang()">EN/AR</button>

<div class="header">
    <h2 id="title" style="margin-top:20px;">بي برو - سحابي</h2>
    <button id="adminLoginBtn" class="btn btn-primary" style="width:auto; padding:5px 20px;" onclick="checkAdmin()">دخول المدير</button>
    
    <div id="adminTools" style="display:none; flex-direction: column; gap: 5px; margin-top:10px;">
        <button class="btn btn-primary" onclick="openBikeList()">➕ إضافة من القائمة (1-200)</button>
        <button class="btn btn-dark" onclick="addManual()">⌨️ إضافة يدوي (اسم أو رقم)</button>
    </div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن سيكل..." oninput="renderBikes()">
</div>

<div id="activeRentals"></div>

<div id="bikeModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 style="margin:0; font-size:1.1rem;">اختر رقم السيكل</h3>
            <button onclick="closeModals()" style="background:var(--danger); color:white; border:none; padding:5px 15px; border-radius:8px; font-weight:bold;">إغلاق X</button>
        </div>
        <div class="modal-body">
            <div class="grid-select" id="bikeGrid"></div>
        </div>
    </div>
</div>

<div id="editModal" class="modal">
    <div class="modal-content" style="padding:20px;">
        <h3 id="editModalTitle">تعديل البيانات</h3>
        <input type="hidden" id="editKey">
        <div class="input-group">
            <label>تغيير رقم/اسم السيكل:</label>
            <input type="text" id="editId">
        </div>
        <div class="input-group">
            <label>إضافة دقائق (مثال 10) أو نقص (-10):</label>
            <input type="number" id="editTime" placeholder="0">
        </div>
        <button class="btn btn-primary" onclick="saveEdit()">حفظ التعديلات</button>
        <button class="btn btn-danger" onclick="deleteBike()">حذف السيكل نهائياً</button>
        <button class="btn btn-dark" onclick="closeModals()">إلغاء</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyARmaRrsN2WRdpeXtQScQnu9MYFS8vqVXU",
        authDomain: "bikepro-969da.firebaseapp.com",
        projectId: "bikepro-969da",
        storageBucket: "bikepro-969da.firebasestorage.app",
        messagingSenderId: "350586929595",
        appId: "1:350586929595:web:dc1823c9c18aa397ec849e",
        measurementId: "G-JVVN45N7GD",
        databaseURL: "https://bikepro-969da-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let isAdmin = false;
    let currentLang = 'ar';
    let allBikes = {};

    function toggleLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        document.getElementById('title').innerText = currentLang === 'ar' ? "بي برو - مراقب" : "BikePro - Monitor";
        document.getElementById('searchInput').placeholder = currentLang === 'ar' ? "ابحث عن سيكل..." : "Search bike...";
    }

    function checkAdmin() {
        if(prompt("كلمة السر:") === "1234") {
            isAdmin = true;
            document.getElementById('adminTools').style.display = 'flex';
            document.getElementById('adminLoginBtn').style.display = 'none';
        }
    }

    function openBikeList() {
        const grid = document.getElementById('bikeGrid');
        grid.innerHTML = '';
        for(let i=1; i<=200; i++) {
            const item = document.createElement('div');
            item.className = 'grid-item';
            item.innerText = i;
            item.onclick = () => createRental(i);
            grid.appendChild(item);
        }
        document.getElementById('bikeModal').style.display = 'flex';
    }

    function addManual() {
        let id = prompt("أدخل رقم أو اسم السيكل:");
        if(id) createRental(id);
    }

    function createRental(id) {
        let mins = prompt("مدة الإيجار بالدقائق؟", "30");
        if(mins) {
            db.ref('rentals').push({ id: id, end: Date.now() + (parseInt(mins) * 60000) });
            closeModals();
        }
    }

    db.ref('rentals').on('value', (snapshot) => {
        allBikes = snapshot.val() || {};
        renderBikes();
    });

    function renderBikes() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const area = document.getElementById('activeRentals');
        area.innerHTML = '';
        Object.keys(allBikes).forEach(key => {
            const r = allBikes[key];
            if (r.id.toString().toLowerCase().includes(query)) {
                let diff = r.end - Date.now();
                const box = document.createElement('div');
                box.className = `bike-box ${diff <= 0 ? 'state-expired' : ''}`;
                box.innerHTML = `<div style="font-size:0.6rem">سيكل</div><div style="font-weight:900;">${r.id}</div><div style="color:var(--secondary)">${Math.ceil(diff/60000)}m</div>`;
                
                if(isAdmin) {
                    box.onclick = () => {
                        document.getElementById('editKey').value = key;
                        document.getElementById('editId').value = r.id;
                        document.getElementById('editTime').value = "";
                        document.getElementById('editModal').style.display = 'flex';
                    };
                }
                area.appendChild(box);
            }
        });
    }

    function saveEdit() {
        const key = document.getElementById('editKey').value;
        const newId = document.getElementById('editId').value;
        const addMins = parseInt(document.getElementById('editTime').value) || 0;
        
        db.ref('rentals/'+key).once('value', s => {
            db.ref('rentals/'+key).update({
                id: newId,
                end: s.val().end + (addMins * 60000)
            });
        });
        closeModals();
    }

    function deleteBike() {
        if(confirm("هل تريد حذف هذا السيكل؟")) {
            db.ref('rentals/'+document.getElementById('editKey').value).remove();
            closeModals();
        }
    }

    function closeModals() {
        document.getElementById('bikeModal').style.display = 'none';
        document.getElementById('editModal').style.display = 'none';
    }

    setInterval(renderBikes, 30000);
</script>
</body>
</html>
