<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BikePro - Multi Select</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <style>
        :root { --primary: #00b894; --secondary: #0984e3; --dark: #2d3436; --light: #f1f2f6; --danger: #d63031; }
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; touch-action: manipulation; }
        body { background: var(--light); margin: 0; padding: 10px; text-align: center; }
        
        .header { background: white; padding: 15px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-bottom: 10px; position: relative; }
        .btn { padding: 12px; border-radius: 12px; font-weight: bold; width: 100%; border: none; cursor: pointer; margin-top: 5px; font-size: 1rem; }
        .btn-primary { background: var(--secondary); color: white; }
        .btn-dark { background: var(--dark); color: white; }
        .btn-danger { background: var(--danger); color: white; }
        
        .lang-btn { position: absolute; top: 15px; left: 15px; width: auto; padding: 5px 10px; font-size: 0.7rem; background: var(--dark); color: white; border-radius: 8px; z-index: 10000; }

        .search-container { margin-bottom: 15px; }
        .search-input { width: 100%; padding: 12px; border-radius: 12px; border: 2px solid #ddd; font-size: 1rem; text-align: center; outline: none; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; }
        .modal-content { background: white; border-radius: 25px; width: 95%; max-width: 450px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { padding: 15px; background: white; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 15px; overflow-y: auto; flex-grow: 1; }

        .grid-select { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .grid-item { background: #f0f0f0; padding: 15px 2px; border-radius: 8px; font-weight: bold; border: 1px solid #ddd; cursor: pointer; }
        
        /* شكل السيكل المحدد (أزرق) */
        .grid-item.selected { background: var(--secondary); color: white; border-color: #000; transform: scale(0.95); }
        .grid-item.disabled { background: #eee; color: #bbb; cursor: not-allowed; opacity: 0.4; }

        .modal-footer { padding: 15px; border-top: 1px solid #eee; display: flex; flex-direction: column; gap: 10px; }

        #activeRentals { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .bike-box { background: white; border-radius: 12px; padding: 12px 2px; border-bottom: 4px solid var(--primary); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .state-expired { border-bottom-color: var(--danger); animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<button class="btn lang-btn" onclick="toggleLang()">EN / عربي</button>

<div class="header">
    <h2 id="txt-title">بي برو - سحابي</h2>
    <div id="adminArea">
        <div id="loginSection">
            <input type="password" id="passCode" placeholder="كلمة السر" style="width:60%; padding:8px; border-radius:8px; border:1px solid #ddd; text-align:center;">
            <button onclick="checkAdmin()" id="txt-login-btn" style="padding: 8px 15px; border-radius: 8px; background: var(--dark); color: white; border: none;">دخول</button>
        </div>
        <div id="adminTools" style="display:none; flex-direction: column; gap: 5px;">
            <button class="btn btn-primary" id="txt-list-btn" onclick="openBikeList()">➕ قائمة السياكل (تحديد متعدد)</button>
            <button class="btn btn-dark" id="txt-manual-btn" onclick="addManual()">⌨️ إضافة يدوية</button>
            <button onclick="location.reload()" id="txt-logout" style="font-size: 0.7rem; background: none; border: none; color: gray;">تسجيل خروج</button>
        </div>
    </div>
</div>

<div class="search-container">
    <input type="text" id="searchInput" class="search-input" placeholder="ابحث عن سيكل..." oninput="renderBikes()">
</div>

<div id="activeRentals"></div>

<div id="bikeModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="txt-modal-list">اختر السياكل</h3>
            <button onclick="closeModals()" class="btn-danger" style="padding:5px 10px; border-radius:8px; border:none; color:white;">X</button>
        </div>
        <div class="modal-body">
            <div class="grid-select" id="bikeGrid"></div>
        </div>
        <div class="modal-footer">
            <div style="display:flex; gap:10px;">
                <button onclick="startMultiSelect(30)" id="txt-start-30" class="btn btn-primary" style="flex:1; background:var(--primary);">بدأ (30د)</button>
                <button onclick="startMultiSelect(60)" id="txt-start-60" class="btn btn-primary" style="flex:1;">بدأ (60د)</button>
            </div>
        </div>
    </div>
</div>

<div id="editModal" class="modal"><div class="modal-content" style="padding:20px;"><h3 id="txt-edit-title">تعديل البيانات</h3><input type="hidden" id="editKey"><input type="text" id="editId" style="width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ddd;"><input type="number" id="editTime" style="width:100%; padding:10px; margin:5px 0; border-radius:8px; border:1px solid #ddd;" placeholder="إضافة وقت"><button class="btn btn-primary" id="txt-save" onclick="saveEdit()">حفظ</button><button class="btn btn-danger" id="txt-delete" onclick="deleteBike()">حذف</button><button class="btn btn-dark" id="txt-cancel" onclick="closeModals()">إلغاء</button></div></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyARmaRrsN2WRdpeXtQScQnu9MYFS8vqVXU",
        authDomain: "bikepro-969da.firebaseapp.com",
        projectId: "bikepro-969da",
        storageBucket: "bikepro-969da.firebasestorage.app",
        messagingSenderId: "350586929595",
        appId: "1:350586929595:web:dc1823c9c18aa397ec849e",
        measurementId: "G-JVVN45N7GD",
        databaseURL: "https://bikepro-969da-default-rtdb.firebaseio.com"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let isAdmin = false;
    let currentLang = 'ar';
    let selectedBikes = []; 
    let allBikes = {};

    const languages = {
        ar: { title: "بي برو - سحابي", loginBtn: "دخول", listBtn: "➕ قائمة السياكل (تحديد متعدد)", manualBtn: "⌨️ إضافة يدوية", logout: "تسجيل خروج", searchPlace: "ابحث عن سيكل...", modalList: "اختر السياكل", cancel: "إلغاء", editTitle: "تعديل البيانات", save: "حفظ", delete: "إزالة", bikeTxt: "سيكل", activeAlert: "محجوز حالياً!", start30: "بدأ (30د)", start60: "بدأ (60د)" },
        en: { title: "BikePro - Cloud", loginBtn: "Login", listBtn: "➕ Bike List (Multi-Select)", manualBtn: "⌨️ Manual Add", logout: "Logout", searchPlace: "Search bike...", modalList: "Select Bikes", cancel: "Cancel", editTitle: "Edit Details", save: "Save", delete: "Remove", bikeTxt: "Bike", activeAlert: "Active!", start30: "Start (30m)", start60: "Start (60m)" }
    };

    function toggleLang() {
        currentLang = currentLang === 'ar' ? 'en' : 'ar';
        document.documentElement.dir = currentLang === 'ar' ? 'rtl' : 'ltr';
        updateUI();
    }

    function updateUI() {
        const l = languages[currentLang];
        document.getElementById('txt-title').innerText = l.title;
        document.getElementById('txt-login-btn').innerText = l.loginBtn;
        document.getElementById('txt-list-btn').innerText = l.listBtn;
        document.getElementById('txt-manual-btn').innerText = l.manualBtn;
        document.getElementById('txt-logout').innerText = l.logout;
        document.getElementById('searchInput').placeholder = l.searchPlace;
        document.getElementById('txt-modal-list').innerText = l.modalList;
        document.getElementById('txt-edit-title').innerText = l.editTitle;
        document.getElementById('txt-save').innerText = l.save;
        document.getElementById('txt-delete').innerText = l.delete;
        document.getElementById('txt-cancel').innerText = l.cancel;
        document.getElementById('txt-start-30').innerText = l.start30;
        document.getElementById('txt-start-60').innerText = l.start60;
        renderBikes();
    }

    function checkAdmin() {
        if(document.getElementById('passCode').value === "1234") {
            isAdmin = true;
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('adminTools').style.display = 'flex';
            renderBikes();
        }
    }

    function openBikeList() {
        selectedBikes = []; // تصفير التحديد عند فتح القائمة
        const grid = document.getElementById('bikeGrid');
        grid.innerHTML = '';
        const activeIds = Object.values(allBikes).map(b => b.id.toString());

        for(let i=1; i<=200; i++) {
            const item = document.createElement('div');
            item.className = activeIds.includes(i.toString()) ? 'grid-item disabled' : 'grid-item';
            item.innerText = i;
            
            if (!activeIds.includes(i.toString())) {
                item.onclick = function() {
                    if (this.classList.contains('selected')) {
                        this.classList.remove('selected');
                        selectedBikes = selectedBikes.filter(id => id !== i);
                    } else {
                        this.classList.add('selected');
                        selectedBikes.push(i);
                    }
                };
            } else {
                item.onclick = () => alert(languages[currentLang].activeAlert);
            }
            grid.appendChild(item);
        }
        document.getElementById('bikeModal').style.display = 'flex';
    }

    function startMultiSelect(mins) {
        if (selectedBikes.length === 0) return alert(currentLang === 'ar' ? "يرجى تحديد سيكل واحد على الأقل" : "Select at least one bike");
        
        selectedBikes.forEach(id => {
            db.ref('rentals').push({ id: id, end: Date.now() + (mins * 60000) });
        });
        
        closeModals();
    }

    function addManual() {
        let id = prompt(currentLang === 'ar' ? "رقم السيكل:" : "Bike No:");
        if(id) {
            const activeIds = Object.values(allBikes).map(b => b.id.toString());
            if(activeIds.includes(id.toString())) return alert(languages[currentLang].activeAlert);
            selectedBikes = [id];
            // للإضافة اليدوية نفتح خيار الوقت فوراً
            let mins = confirm(currentLang === 'ar' ? "تأكيد إضافة 30 دقيقة؟ (إلغاء لـ 60 دقيقة)" : "Add 30m? (Cancel for 60m)") ? 30 : 60;
            startMultiSelect(mins);
        }
    }

    db.ref('rentals').on('value', (snapshot) => {
        allBikes = snapshot.val() || {};
        renderBikes();
    });

    function renderBikes() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const area = document.getElementById('activeRentals');
        area.innerHTML = '';
        Object.keys(allBikes).forEach(key => {
            const r = allBikes[key];
            if (r.id.toString().toLowerCase().includes(query)) {
                let diff = r.end - Date.now();
                const box = document.createElement('div');
                box.className = `bike-box ${diff <= 0 ? 'state-expired' : ''}`;
                let timeTxt = diff <= 0 ? (currentLang === 'ar' ? "انتهى" : "Done") : Math.ceil(diff/60000) + "m";
                box.innerHTML = `<div style="font-size:0.6rem">${languages[currentLang].bikeTxt}</div><div style="font-weight:900;">${r.id}</div><div style="font-size:0.8rem; color:var(--secondary)">${timeTxt}</div>`;
                if(isAdmin) {
                    box.onclick = () => {
                        document.getElementById('editKey').value = key;
                        document.getElementById('editId').value = r.id;
                        document.getElementById('editModal').style.display = 'flex';
                    };
                }
                area.appendChild(box);
            }
        });
    }

    function saveEdit() {
        const key = document.getElementById('editKey').value;
        const addMins = parseInt(document.getElementById('editTime').value) || 0;
        db.ref('rentals/'+key).once('value', s => {
            db.ref('rentals/'+key).update({ id: document.getElementById('editId').value, end: s.val().end + (addMins * 60000) });
        });
        closeModals();
    }

    function deleteBike() {
        if(confirm(currentLang === 'ar' ? "حذف؟" : "Delete?")) {
            db.ref('rentals/'+document.getElementById('editKey').value).remove();
            closeModals();
        }
    }

    function closeModals() {
        document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
    }

    setInterval(renderBikes, 15000);
</script>
</body>
</html>
